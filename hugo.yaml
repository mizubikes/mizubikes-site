baseURL: https://mizubikes.com
languageCode: en-US
title: Mizubikes
theme: PaperMod
services:
  googleAnalytics:
    id: G-6C4532LJC9
taxonomies:
  category: categories
  tag: tags
params:
  description: "Road bikes, mountain bikes, gravel builds, and honest reviews."
  defaultTheme: light
  disableThemeToggle: true
  showShareButtons: false
  showReadingTime: true
  showToc: false
  showBreadCrumbs: false
  showCodeCopyButtons: false
  comments: false
  hideFoter: false
  cover:
    responsiveImages: false
    hiddenInList: false
    hiddenInSingle: false
  assets:
    favicon: /favicon.ico
    disableHLJS: true
markup:
  goldmark:
    renderer:
      unsafe: true
outputs:
  home:
    - HTML
    - RSS
    - JSON
outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: feed
menu:
  main:
    - identifier: menu-road
      name: Road
      url: /categories/road/
      weight: 1
    - identifier: menu-mountain
      name: Mountain
      url: /categories/mountain/
      weight: 2
    - identifier: menu-gravel
      name: Gravel
      url: /categories/gravel/
      weight: 3
    - identifier: menu-ebike
      name: E-Bike
      url: /categories/e-bike/
      weight: 4
    - identifier: menu-bike-repair
      name: Bike Repair
      url: /categories/bike-repair/
      weight: 5
    - identifier: menu-bike-builds
      name: Bike Builds
      url: /categories/bike-builds/
      weight: 6
    - identifier: menu-deals
      name: Deals
      url: /categories/deals/
      weight: 7
