{{- /* Custom Mizubikes header */ -}}
<header class="header">
    <nav class="nav">
        <div class="logo">
            <a href="{{ "" | absLangURL }}" accesskey="h" title="Mizubikes" style="text-decoration: none;">
                <span style="font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #1B8FAB;">MIZU</span><span style="font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--primary);">BIKES</span>
            </a>
        </div>
        <ul id="menu">
            {{- range .Site.Menus.main }}
            <li>
                <a href="{{ .URL | absURL }}"
                   title="{{ .Title }}"
                   {{- if $.IsMenuCurrent "main" . }} aria-current="page"{{- end }}>
                    {{- .Name -}}
                </a>
            </li>
            {{- end }}
            <li>
                <a href="/search/" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </a>
            </li>
        </ul>
    </nav>
</header>
